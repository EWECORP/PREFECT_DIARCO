    schedule:
      cron: "*/5 8-17 * * *"
      timezone: "America/Argentina/Buenos_Aires"

  - name: CDC_T117_COMPRADORES_PILOTO
    entrypoint: scripts/cdc/cdc_replicar_tabla.py:replicar_tabla_cdc
    description: "Piloto CDC SQL Server -> PostgreSQL directo sobre src.t117_compradores"
