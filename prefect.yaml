  - name: CDC_T100_EMPRESA_SUC_PILOTO
    entrypoint: scripts/cdc/cdc_replicar_tabla.py:replicar_tabla_cdc
    description: "Piloto CDC SQL Server -> PostgreSQL directo sobre src.t100_empresa_suc"
