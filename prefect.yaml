    schedule:
      cron: "*/5 8-17 * * *"
      timezone: "America/Argentina/Buenos_Aires"

  - name: CDC_T051_ARTICULOS_SUCURSAL_PILOTO
    entrypoint: scripts/cdc/cdc_replicar_tabla.py:replicar_tabla_cdc
    description: "Piloto CDC SQL Server -> PostgreSQL directo sobre src.t051_articulos_sucursal"
    tags: ["cdc", "piloto", "maestros"]
    work_pool:
      name: dmz-diarco
      work_queue_name: replicas-dmz
    parameters:
      config_name: pilot_t051_articulos_sucursal
    schedule:
      cron: "*/10 8-17 * * *"
      timezone: "America/Argentina/Buenos_Aires"

  - name: CDC_T020_PROVEEDOR_DIAS_ENTREGA_CABE_PILOTO
    entrypoint: scripts/cdc/cdc_replicar_tabla.py:replicar_tabla_cdc
    description: "Piloto CDC SQL Server -> PostgreSQL directo sobre src.t020_proveedor_dias_entrega_cabe"
    tags: ["cdc", "piloto", "maestros"]
    work_pool:
      name: dmz-diarco
      work_queue_name: replicas-dmz
    parameters:
      config_name: pilot_t020_proveedor_dias_entrega_cabe
    schedule:
      cron: "*/5 8-17 * * *"
      timezone: "America/Argentina/Buenos_Aires"

  - name: CDC_T020_PROVEEDOR_DIAS_ENTREGA_DETA_PILOTO
    entrypoint: scripts/cdc/cdc_replicar_tabla.py:replicar_tabla_cdc
    description: "Piloto CDC SQL Server -> PostgreSQL directo sobre src.t020_proveedor_dias_entrega_deta"
    tags: ["cdc", "piloto", "maestros"]
    work_pool:
      name: dmz-diarco
      work_queue_name: replicas-dmz
    parameters:
      config_name: pilot_t020_proveedor_dias_entrega_deta
    schedule:
      cron: "*/5 8-17 * * *"
      timezone: "America/Argentina/Buenos_Aires"

  - name: CDC_MONITOR_FASE_1
    entrypoint: scripts/cdc/cdc_monitor.py:monitorear_cdc
    description: "Monitorea salud de los pilotos CDC y alerta cuando fallan o quedan atrasados"
    tags: ["cdc", "monitor", "observabilidad"]
    work_pool:
      name: dmz-diarco
      work_queue_name: replicas-dmz
    parameters:
      notify: true
      notify_on_warning: false
      fail_on_critical: true
      stale_factor: 3.0
      min_stale_minutes: 15
      failure_threshold: 2
      lookback_runs: 5
      monitor_timezone: "America/Argentina/Buenos_Aires"
      active_window_start: "08:00"
      active_window_end: "18:00"
    schedule:
      cron: "*/10 8-17 * * *"
      timezone: "America/Argentina/Buenos_Aires"

  - name: FORECAST_PUSH_INPUT_DATA_PROD
    entrypoint: scripts/push/flujo_push_datos_forecast.py:forecast_flow
    description: "Carga Diaria de Datos de proveedores habilitados"
    tags: ["push", "forecast", "datos"]
    work_pool:
      name: dmz-diarco
      work_queue_name: push-forecast
    schedule:
      cron:  "50 6 * * 1-5"   # Todos los días hábiles a las 6:50 AM  (REV)
      timezone: "America/Argentina/Buenos_Aires"
    parameters: {}

  - name: FORECAST_REFRESH_INPUT_DATA_PROD
    entrypoint: scripts/push/flujo_refresh_datos_forecast.py:forecast_flow
    description: "Actualización de Datos al mediodia de proveedores habilitados"
    tags: ["push", "forecast", "datos"]
    work_pool:
      name: dmz-diarco
      work_queue_name: push-forecast
    schedule:
      cron:  "35 13 * * 1-5"   # Todos los días hábiles a las 13:35 PM  (REV)
      timezone: "America/Argentina/Buenos_Aires"
    parameters: {}

  - name: FORECAST_PUSH_VENTAS_STOCK_DIARIO_PROD
    entrypoint: scripts/send/actualizar_bases_ventas.py:actualizar_bases_ventas
    description: "Carga Diaria de Datos de Ventas y Stock"
    tags: ["send", "forecast", "datos"]
    work_pool:
      name: dmz-diarco
      work_queue_name: push-forecast
    schedule:
      cron:  "45 5 * * *"   # Todos los días a las 5:45 AM  (REV)
      timezone: "America/Argentina/Buenos_Aires"
    parameters: {}

  - name: exportar_tabla_sql_sftp
    entrypoint: scripts/send/exportar_tabla_sqlserver_sftp.py:exportar_tabla_sql_sftp
    description: "Flujo para exportar una tabla desde SQL Server, comprimirla y transferirla vía SFTP"
    tags: ["replicacion", "sqlserver", "sftp", "etl"]
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    parameters: {}  # Parámetros definidos al momento de ejecutar el flujo

  - name: push_tablas_dmz_a_postgres
    entrypoint: scripts/send/flujo_maestro_replica_datos.py:flujo_maestro
    description: "Flujo maestro orquestador para exportar, transferir e importar tablas entre SQL Server y PostgreSQL"
    tags: ["orquestador", "replicacion", "pipeline", "etl"]
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    parameters: {}  # Parámetros definidos al momento de ejecutar el flujo

  - name: MASTER_SYNC_MAESTROS_POSTGRES_PROD
    entrypoint: scripts/send/actualizar_tablas_maestras.py:actualizar_tablas_maestras
    description: "Flujo maestro orquestador para subir tablas maestras entre SQL Server y PostgreSQL"
    tags: ["orquestador", "replicacion", "pipeline", "etl"]
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    schedule:
      cron:  "50 5 * * *"   # Todos los días  a las 5:50 AM  (REV)
      timezone: "America/Argentina/Buenos_Aires"
    parameters: {}  # Parámetros definidos al momento de ejecutar el flujo

  - name: MASTER_REFRESH_MAESTROS_POSTGRES_PROD
    entrypoint: scripts/send/refresh_tablas_maestras.py:main_flow
    description: "Flujo maestro orquestador para REFRESCAR tablas entre SQL Server y PostgreSQL"
    tags: ["orquestador", "replicacion", "pipeline", "etl"]
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    schedule:
      cron:  "05 13 * * *"   # Todos los días a las 13:05 PM  (REV)
      timezone: "America/Argentina/Buenos_Aires"
    parameters: {}  # Parámetros definidos al momento de ejecutar el flujo

  - name: MASTER_SYNC_TABULARES_POSTGRES_PROD
    entrypoint: scripts/send/actualizar_tablas_tabulares.py:actualizar_tablas_tabulares
    description: "Flujo maestro orquestador para subir tablas Tabulares entre SQL Server y PostgreSQL"
    tags: ["orquestador", "replicacion", "pipeline", "etl"]
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    schedule:
      cron:  "30 5 * * *"   # Todos los días a las 5:30 AM  (REV)
      timezone: "America/Argentina/Buenos_Aires"
    parameters: {}  # Parámetros definidos al momento de ejecutar el flujo

  - name: ETL_REFRESH_BVE_DIARIO_PROD
    entrypoint: scripts/push/actualizar_base_ventas_extendida.py:actualizar_base_ventas_extendida
    description: "Carga incremental con ventana y upsert"
    tags: ["bve","etl","diario"]
    version: "1.0.1"
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    parameters:
      window_days: 14
      analyze: true
    schedule:
      cron: "05 7 * * *"   # todos los días 07:05 AM (REV)
      timezone: "America/Argentina/Buenos_Aires"

  - name: ETL_REFRESH_BVE_BARRIO_DIARIO_PROD
    entrypoint: scripts/push/actualizar_base_ventas_extendida_barrio.py:actualizar_base_ventas_extendida_barrio
    description: "Carga incremental con ventana y upsert"
    tags: ["bve","etl","diario"]
    version: "1.0.1"
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    parameters:
      window_days: 14
      analyze: true
    schedule:
      cron: "45 6 * * *"   # todos los días 06:15 América/Buenos_Aires
      timezone: "America/Argentina/Buenos_Aires"

  - name: envio-manual-tabla
    version: null
    tags:
      - dmz
      - manual
      - replicacion
      - sqlserver
      - postgres
      - diarco
    description: >-
      Deployment manual ETL_DIARCO para enviar una única tabla desde SQL Server hacia PostgreSQL,
      parametrizando esquema origen, tabla origen, esquema destino, tabla destino, filtro SQL y truncado.
    entrypoint: scripts/send/flujo_envio_manual_tabla_final.py:envio_manual_tabla_sql_a_postgres
    parameters:
      esquema_sql: repl
      tabla_sql: T050_ARTICULOS
      schema_pg: src
      tabla_pg: t050_articulos
      filtro_sql: 1=1
      truncar_destino: true
      validar_nombres: true
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    schedules: []


  - name: TRANSFER_PUBLISH_VKM_PROD
    entrypoint: scripts/pull/flujo_publicar_transferencias_sgm_vk.py:publicar_transferencias_sgm_vk
    description: "Flujo Publicar y Actualizar estado Transferencias SGM_VKM"
    tags: ["Transferencias", "replicacion", "pipeline", "etl"]
    work_pool:
      name: dmz-diarco
      work_queue_name: pull-connexa
    schedule:
      cron:  "35 17 * * *"   # Todos los días a las 17:35 PM  (REV)
      timezone: "America/Argentina/Buenos_Aires"
    parameters: {}  # Parámetros definidos al momento de ejecutar el flujo

  - name: IOSDB_PRODUCTS_LAB
    entrypoint: IOSdb/main.py:products_flow
    description: "Sincroniza productos hacia la plataforma IOS"
    tags: ["iosdb", "lab", "products"]
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    schedule:
      cron: "0 7 * * *"
      timezone: "America/Argentina/Buenos_Aires"
    parameters:
      notify: true

  - name: IOSDB_STOCK_MAYORISTA_LAB
    entrypoint: IOSdb/main.py:mayorista_flow
    description: "Sincroniza stock mayorista hacia la plataforma IOS"
    tags: ["iosdb", "lab", "stock", "mayorista"]
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    schedule:
      cron: "0 8 * * *"
      timezone: "America/Argentina/Buenos_Aires"
    parameters:
      notify: true
      max_workers: 10

  - name: IOSDB_STOCK_BARRIO_LAB
    entrypoint: IOSdb/main.py:barrio_flow
    description: "Sincroniza stock barrio hacia la plataforma IOS"
    tags: ["iosdb", "lab", "stock", "barrio"]
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    schedule:
      cron: "0 9 * * *"
      timezone: "America/Argentina/Buenos_Aires"
    parameters:
      notify: true
      max_workers: 10

  - name: IOSDB_RETRY_LAB
    entrypoint: IOSdb/main.py:retry_flow
    description: "Reintenta payloads IOSdb fallidos"
    tags: ["iosdb", "lab", "retry"]
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    schedule:
      cron: "30 10 * * *"
      timezone: "America/Argentina/Buenos_Aires"
    parameters:
      notify: true

  - name: IOSDB_CATEGORIES_MANUAL
    entrypoint: IOSdb/main.py:categories_flow
    description: "Sincronizacion manual de categorias IOS"
    tags: ["iosdb", "manual", "categories"]
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    parameters:
      notify: false

  - name: IOSDB_CADENA_MANUAL
    entrypoint: IOSdb/main.py:cadena_flow
    description: "Sincronizacion manual de stock cadena IOS"
    tags: ["iosdb", "manual", "stock", "cadena"]
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    parameters:
      notify: false

  - name: IOSDB_INITIAL_PRODUCTS_MANUAL
    entrypoint: IOSdb/main.py:initial_products_flow
    description: "Carga inicial manual de productos IOS"
    tags: ["iosdb", "manual", "products", "initial-load"]
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    parameters:
      notify: false

  - name: IOSDB_MASTER_MANUAL
    entrypoint: IOSdb/main.py:iosdb_master_flow
    description: "Flujo maestro IOSdb para ejecuciones manuales o coordinadas"
    tags: ["iosdb", "manual", "master"]
    work_pool:
      name: dmz-diarco
      work_queue_name: default
    parameters:
      run_products: true
      run_mayorista: true
      run_barrio: true
      run_retry: true
      run_categories: false
      run_cadena: false
      notify: true


  # ==========================================================
  # TEST
  # ==========================================================
  - name: PAS_PUSH_OC_RECEPCION_TEST
    description: "Sincronización de Órdenes de Compra (Recepción) hacia CONNEXA TEST.
      Origen: diarco_data (DMZ)
      Destino: PostgreSQL TEST (PGT_*)"
    entrypoint: scripts/pull/sincronizar_oc_recepcion.py:sync_flow
    parameters:
      dest_env: TEST
    work_pool:
      name: dmz-diarco
    work_queue_name: recepcion
    tags: ["oc", "recepcion", "diarco", "test"]
    schedules:
      - cron: "0 */2 * * *"
        timezone: America/Argentina/Buenos_Aires
        active: false

  # ==========================================================
  # DESA
  # ==========================================================
  - name: PAS_PUSH_OC_RECEPCION_DESA
    description: "Sincronización de Órdenes de Compra (Recepción) hacia CONNEXA DESARROLLO.
      Origen: diarco_data (DMZ)
      Destino: PostgreSQL DESA (PGD_*)"
    entrypoint: scripts/pull/sincronizar_oc_recepcion.py:sync_flow
    parameters:
      dest_env: DESA
    work_pool:
      name: dmz-diarco
    work_queue_name: recepcion
    tags: ["oc", "recepcion", "diarco", "desa"]
    schedules:
      - cron: "0 * * * *"
        timezone: America/Argentina/Buenos_Aires
        active: false

  # ==========================================================
  # PROD
  # ==========================================================
  - name: PAS_PUSH_OC_RECEPCION_PROD
    description: "Sincronización de Órdenes de Compra (Recepción) hacia CONNEXA PRODUCCIÓN.
      Origen: diarco_data (DMZ)
      Destino: PostgreSQL PROD (PGP_*)"
    entrypoint: scripts/pull/sincronizar_oc_recepcion.py:sync_flow
    parameters:
      dest_env: PROD
    work_pool:
      name: dmz-diarco
    work_queue_name: recepcion
    tags: ["oc", "recepcion", "diarco", "prod"]
    schedules:
      - cron: "*/15 * * * *"
        timezone: America/Argentina/Buenos_Aires
        active: false


