name: dmz_diarco_flows
prefect-version: 3.4.1

pull:
- prefect.deployments.steps.set_working_directory:
    directory: E:/ETL/ETL_DIARCO

deployments:
  - name: OC_PUBLISH_PRECARGA_PROD
    entrypoint: scripts/pull/flujo_pull_PRECARGA_OC.py:precargar_OC_connexa
    description: "Publica las OC en estado 90 desde PostgreSQL hacia SQL Server"
    tags: ["pull", "oc", "precarga"]
    work_pool:
      name: dmz-diarco
      work_queue_name: pull-connexa
    schedule:
      cron: "*/10 8-17 * * 1-5"  # Cada 10 minutos entre las 8:00 AM y las 5:59 PM de lunes a viernes (REV)
      timezone: "America/Argentina/Buenos_Aires"
    parameters: {}

  - name: REPL_SYNC_CDC_LOTES_PROD
    entrypoint: scripts/repl/flujo_replicar_DMZ_en_LOTES.py:sync_dmz_optimizado
    description: "Obtiene actualizaciones de los datos LEGACY en la DMZ (CDC)"
    tags: ["repl", "dmz", "datos"]
    work_pool:
      name: dmz-diarco
      work_queue_name: replicas-dmz
    schedule:
      cron:  "0 5 * * *"  # Todos los días a las 5 AM  (REV)
      timezone: "America/Argentina/Buenos_Aires"
    parameters: {}

  - name: CDC_T050_ARTICULOS_PILOTO
    entrypoint: scripts/cdc/cdc_replicar_tabla.py:replicar_tabla_cdc
    description: "Piloto CDC SQL Server -> PostgreSQL directo sobre src.t050_articulos"
    tags: ["cdc", "piloto", "maestros"]
    work_pool:
      name: dmz-diarco
      work_queue_name: replicas-dmz
    parameters:
      config_name: pilot_t050_articulos
    schedule:
      cron: "*/5 8-17 * * *"
      timezone: "America/Argentina/Buenos_Aires"

  - name: CDC_T020_PROVEEDOR_PILOTO
    entrypoint: scripts/cdc/cdc_replicar_tabla.py:replicar_tabla_cdc
    description: "Piloto CDC SQL Server -> PostgreSQL directo sobre src.t020_proveedor"
    tags: ["cdc", "piloto", "maestros"]
    work_pool:
      name: dmz-diarco
