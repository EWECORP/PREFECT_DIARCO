    work_pool:
      name: dmz-diarco
      work_queue_name: replicas-dmz
    parameters:
      config_name: pilot_t100_empresa_suc
    schedule:
      cron: "*/5 8-17 * * *"
      timezone: "America/Argentina/Buenos_Aires"

  - name: CDC_T114_RUBROS_PILOTO
    entrypoint: scripts/cdc/cdc_replicar_tabla.py:replicar_tabla_cdc
    description: "Piloto CDC SQL Server -> PostgreSQL directo sobre src.t114_rubros"
    tags: ["cdc", "piloto", "maestros"]
    work_pool:
      name: dmz-diarco
